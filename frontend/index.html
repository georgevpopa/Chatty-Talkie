<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatty Talkie - Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🗣️ Chatty Talkie</h1>
            <p class="subtitle">Romanian • Spanish • English Translator</p>
        </header>

        <div class="translator-box">
            <!-- Language selectors -->
            <div class="lang-bar">
                <select id="source-lang" aria-label="Source language">
                    <option value="en">English</option>
                    <option value="ro">Romanian</option>
                    <option value="es">Spanish</option>
                </select>

                <button id="swap-btn" class="swap-btn" aria-label="Swap languages" title="Swap languages">
                    ⇄
                </button>

                <select id="target-lang" aria-label="Target language">
                    <option value="ro">Romanian</option>
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                </select>
            </div>

            <!-- Text areas -->
            <div class="text-panels">
                <div class="panel source-panel">
                    <textarea
                        id="source-text"
                        placeholder="Type or paste text here..."
                        aria-label="Source text"
                        maxlength="5000"
                    ></textarea>
                    <div class="panel-footer">
                        <span id="char-count">0 / 5000</span>
                        <button id="clear-btn" class="icon-btn" title="Clear text" aria-label="Clear text">✕</button>
                    </div>
                </div>

                <div class="panel target-panel">
                    <textarea
                        id="target-text"
                        placeholder="Translation will appear here..."
                        aria-label="Translated text"
                        readonly
                    ></textarea>
                    <div class="panel-footer">
                        <button id="copy-btn" class="icon-btn" title="Copy translation" aria-label="Copy translation">📋</button>
                    </div>
                </div>
            </div>

            <!-- Translate button -->
            <button id="translate-btn" class="translate-btn">
                Translate
            </button>
        </div>

        <!-- Status bar -->
        <div id="status-bar" class="status-bar">
            <span id="status-text">Checking model status...</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
